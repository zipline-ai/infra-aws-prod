apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hub.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hub.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hub.selectorLabels" . | nindent 8 }}
        {{- if eq .Values.hub.cloudProvider "azure" }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.hub.serviceAccount.name }}
      {{- if .Values.placement.priorityClassName }}
      priorityClassName: {{ .Values.placement.priorityClassName | quote }}
      {{- end }}
      {{- with .Values.placement.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        {{- toYaml .Values.placement.tolerations | nindent 8 }}
      {{- with .Values.placement.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.hub.jarUri }}
      initContainers:
        {{- if eq .Values.hub.cloudProvider "azure" }}
        - name: download-jar
          image: mcr.microsoft.com/azure-cli:latest
          command: ["sh", "-c"]
          args:
            - |
              set -e
              URI="{{ .Values.hub.jarUri }}"
              CONTAINER=$(echo "$URI" | sed 's|abfss://\([^@]*\)@.*|\1|')
              ACCOUNT=$(echo "$URI" | sed 's|abfss://[^@]*@\([^.]*\)\..*|\1|')
              BLOB=$(echo "$URI" | sed 's|abfss://[^/]*/||')
              az login --federated-token "$(cat $AZURE_FEDERATED_TOKEN_FILE)" \
                --service-principal -u "$AZURE_CLIENT_ID" -t "$AZURE_TENANT_ID" \
                --allow-no-subscriptions >/dev/null
              az storage blob download \
                --account-name "$ACCOUNT" \
                --container-name "$CONTAINER" \
                --name "$BLOB" \
                --file /hub/out.jar \
                --auth-mode login \
                --no-progress
              ls -la /hub/out.jar
          volumeMounts:
            - name: hub-jar
              mountPath: /hub
        {{- else if eq .Values.hub.cloudProvider "aws" }}
        - name: download-jar
          image: public.ecr.aws/aws-cli/aws-cli:latest
          command: ["sh", "-c"]
          args:
            - |
              set -e
              URI="{{ .Values.hub.jarUri }}"
              # Accept either s3:// or s3a:// — aws CLI wants s3://
              S3URI=$(echo "$URI" | sed 's|^s3a://|s3://|')
              aws s3 cp "$S3URI" /hub/out.jar --no-progress
              ls -la /hub/out.jar
          volumeMounts:
            - name: hub-jar
              mountPath: /hub
        {{- else }}
        - name: download-jar
          image: {{ .Values.hub.flinkImage }}
          command: ["sh", "-c"]
          args:
            - |
              TOKEN=$(wget -q -O- --header "Metadata-Flavor: Google" \
                "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" \
                | sed 's/.*"access_token":"\([^"]*\)".*/\1/')
              wget --tries=3 -q -O /hub/out.jar \
                --header "Authorization: Bearer $TOKEN" \
                "https://storage.googleapis.com/{{ trimPrefix "gs://" .Values.hub.jarUri }}"
              ls -la /hub/out.jar
          volumeMounts:
            - name: hub-jar
              mountPath: /hub
        {{- end }}
      {{- end }}
      containers:
        - name: hub
          image: eclipse-temurin:21-jre
          command: ["java"]
          args:
            - "-Ddb.url=jdbc:postgresql://{{ include "hub.pgname" . }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
            - "-Ddb.username={{ .Values.postgres.username }}"
            - "-Ddb.password={{ .Values.postgres.password }}"
            - "-Dserver.port={{ .Values.hub.port }}"
            # k8s/src/main/resources/logback_k8s.xml suppresses Slick + Hikari
            # DEBUG that would otherwise drown out every WARN/ERROR line.
            - "-Dlogback.configurationFile=logback_k8s.xml"
            - "-jar"
            - "/hub/out.jar"
            - "run"
            - {{ .Values.hub.mainClasses | quote }}
          env:
            - name: CRUCIBLE_URL
              value: {{ .Values.hub.crucibleUrl | quote }}
            - name: CRUCIBLE_NAMESPACE
              value: {{ .Values.hub.crucibleNamespace | quote }}
            - name: CRUCIBLE_SPARK_IMAGE
              value: {{ .Values.hub.sparkImage | quote }}
            - name: CRUCIBLE_FLINK_IMAGE
              value: {{ .Values.hub.flinkImage | quote }}
            - name: CRUCIBLE_JAR_NAME
              value: {{ .Values.hub.jarName | quote }}
            - name: CRUCIBLE_CLOUD_PROVIDER
              value: {{ .Values.hub.cloudProvider | quote }}
            {{- if .Values.hub.crucibleJarUriOverride }}
            - name: CRUCIBLE_JAR_URI_OVERRIDE
              value: {{ .Values.hub.crucibleJarUriOverride | quote }}
            {{- end }}
            {{- if .Values.hub.cruciblePublicSparkUrl }}
            # Fully-qualified URL operators advertise for the Spark UI surface.
            # JobTrackingInfo.sparkUrl becomes `${this}/jobs/<ns>/<id>/ui` so
            # the links the Hub renders share the same prefix users see for
            # Spark History Server (typically `${crucibleUrl}/spark-history`).
            - name: CRUCIBLE_PUBLIC_SPARK_URL
              value: {{ .Values.hub.cruciblePublicSparkUrl | quote }}
            {{- end }}
            - name: CHRONON_ONLINE_CLASS
              value: {{ .Values.hub.onlineClass | quote }}
            {{- if .Values.hub.gcpProjectId }}
            - name: GCP_PROJECT_ID
              value: {{ .Values.hub.gcpProjectId | quote }}
            {{- end }}
            {{- if .Values.hub.gcpBigtableInstanceId }}
            - name: GCP_BIGTABLE_INSTANCE_ID
              value: {{ .Values.hub.gcpBigtableInstanceId | quote }}
            {{- end }}
            {{- if .Values.hub.gcpRegion }}
            - name: GCP_REGION
              value: {{ .Values.hub.gcpRegion | quote }}
            {{- end }}
            {{- if .Values.hub.azureStorageAccount }}
            - name: AZURE_STORAGE_ACCOUNT
              value: {{ .Values.hub.azureStorageAccount | quote }}
            {{- end }}
            {{- if .Values.hub.azureStorageContainer }}
            - name: AZURE_STORAGE_CONTAINER
              value: {{ .Values.hub.azureStorageContainer | quote }}
            {{- end }}
            {{- if .Values.hub.awsRegion }}
            - name: AWS_REGION
              value: {{ .Values.hub.awsRegion | quote }}
            {{- end }}
            {{- if .Values.hub.awsS3Bucket }}
            - name: AWS_S3_BUCKET
              value: {{ .Values.hub.awsS3Bucket | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.hub.port }}
          readinessProbe:
            httpGet:
              path: /workflow/v2/list?limit=1
              port: {{ .Values.hub.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /workflow/v2/list?limit=1
              port: {{ .Values.hub.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.hub.resources | nindent 12 }}
          volumeMounts:
            - name: hub-jar
              mountPath: /hub
      volumes:
        - name: hub-jar
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hub.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hub.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "hub.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.hub.port }}
      targetPort: {{ .Values.hub.port }}
