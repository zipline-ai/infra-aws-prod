# Hub values for the crucible-eks cluster in canary AWS (account 345594603419,
# us-west-2). The cluster + spark-operator-spark SA (annotated with the
# crucible-spark IRSA role) are provisioned by infra-aws-prod/crucible-aws/
# and helm-released by the crucible chart.
namespace: test-ns-a

hub:
  # Set jarUri at install time:
  #   --set hub.jarUri=s3://zipline-crucible-canary/release/<version>/jars/k8s_assembly.jar
  jarUri: ""

  # Public crucible URL. Used as the base for both API calls AND user-facing
  # tracking URLs emitted by CrucibleSubmitter (getJobUrl/getSparkUrl/etc.) —
  # so links surfaced in the Hub UI are browser-resolvable. Includes the
  # `/spark-history` prefix so the gateway's `/api/v1/...` API surface and the
  # emitted `/jobs/<ns>/<id>/ui` tracking URLs all land under the same Ingress
  # that fronts Spark History Server. In-cluster Hub traffic loops back through
  # the same NLB; latency hit is tolerable for the benefit of one URL config.
  crucibleUrl: "https://crucible-aws.zipline.ai/spark-history"
  crucibleNamespace: "test-ns-a"

  cloudProvider: aws
  # Two verticles: HTTP REST API (CrucibleOrchestrationVerticle) +
  # workflow-execution loop that submits to crucible (CrucibleWorkflowExecutionVerticle).
  mainClasses: "ai.chronon.hub.CrucibleOrchestrationVerticle,ai.chronon.hub.CrucibleWorkflowExecutionVerticle"
  # Spark 3.5 (Scala 2.12) image — matches the canary-published chronon jars
  # (cloud_aws_lib_deploy.jar) which are built for Scala 2.12.18. Spark 4.1
  # bundles Scala 2.13 and produces NoSuchMethodError: wrapRefArray on those
  # jars. Built locally from crucible/docker/spark-3.5/Dockerfile and pushed
  # under an immutable arm64 tag (crucible-eks runs Graviton nodes).
  sparkImage: "345594603419.dkr.ecr.us-west-2.amazonaws.com/spark:3.5.8-java17-hadoop3.4.2-arm64-full34-20260514-081831"
  flinkImage: "345594603419.dkr.ecr.us-west-2.amazonaws.com/flink:1.19-crucible-latest"
  # chronon's python integration suite submits confs that reference
  # ZIPLINE_AWS_JAR_DEFAULT = "cloud_aws_lib_deploy.jar" (see
  # chronon/python/src/ai/chronon/repo/aws.py). Matching that name lets the
  # Spark driver resolve $ARTIFACT_PREFIX/release/latest/jars/<jarName>.
  jarName: "cloud_aws_lib_deploy.jar"
  # Pin the Spark driver to our locally-built cloud_aws jar that includes the
  # NodeConfReader WebIdentityTokenFileCredentialsProvider patch — without
  # this we hit NoAuthWithAWSException when the driver tries to read the
  # staged node config from S3 under IRSA. Keeping it on a separate version
  # path leaves the shared zipline-artifacts-canary/release/latest jar
  # untouched for the EMR canary that runs on Hadoop 3.3.6.
  crucibleJarUriOverride: "s3://zipline-artifacts-canary/release/local-20260514-092539/jars/cloud_aws_lib_deploy.jar"
  onlineClass: "ai.chronon.integrations.aws.AwsApiImpl"

  awsRegion: "us-west-2"
  awsS3Bucket: "zipline-crucible-canary"

  serviceAccount:
    # Created by the crucible helm chart with
    #   eks.amazonaws.com/role-arn: arn:aws:iam::345594603419:role/crucible-spark
    # crucible-spark grants S3 read on zipline-crucible-canary so the init
    # container can download the Hub jar via IRSA.
    name: "spark-operator-spark"

placement:
  priorityClassName: "crucible-system"
  nodeSelector:
    workload-plane: "control"
  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "crucible-system"
      effect: "NoSchedule"
    - key: "kubernetes.io/arch"
      operator: "Exists"
      effect: "NoSchedule"

postgres:
  enabled: true
  persistence:
    enabled: false  # emptyDir for dev/CI

frontend:
  enabled: true
  image:
    repository: 345594603419.dkr.ecr.us-west-2.amazonaws.com/web-ui
    tag: latest
    pullPolicy: Always
  env:
    lokiUrl: "http://crucible-loki.crucible-system.svc.cluster.local:3100"
    lokiNamespace: "test-ns-a"

ingress:
  enabled: true
  ingressClassName: nginx
  host: "crucible-aws.zipline.ai"
  annotations:
    # chronon conf uploads (POST /upload/v2/confs) exceed nginx's default 1MB.
    # Multiday backfill tests post bundles in the hundreds-of-MB range, so we
    # set this generously high (1g). nginx accepts the suffix case-insensitively.
    nginx.ingress.kubernetes.io/proxy-body-size: "1g"
    # Conf upload processing for a multiday workflow is synchronous on the
    # Hub side and easily exceeds nginx's 60s default upstream timeout.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
