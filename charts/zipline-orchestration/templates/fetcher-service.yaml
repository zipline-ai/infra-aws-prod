{{ if .Values.platform.deployFetcher }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipline-fetcher
  namespace: {{ .Release.Namespace }}
  labels:
    app: fetcher
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.platform.orchestration.fetcher.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: fetcher
  template:
    metadata:
      labels:
        app: fetcher
    spec:
      serviceAccountName: {{ .Values.platform.serviceAccount.name }}
      {{- with .Values.platform.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fetcher
          image: "{{ .Values.platform.orchestration.fetcher.image }}:{{ .Values.platform.version }}"
          imagePullPolicy: Always
          env:
            - name: PROVIDER
              value: "AWS"
            - name: FETCHER_PORT
              value: "{{ .Values.platform.orchestration.fetcher.port }}"
            - name: AWS_REGION
              value: "{{ .Values.infra.aws.region }}"
            - name: AWS_DEFAULT_REGION
              value: "{{ .Values.infra.aws.region }}"
            - name: KV_TABLE_PREFIX
              value: "{{ .Values.infra.aws.kvTablePrefix }}"
            - name: KV_REPLICA_REGIONS
              value: "{{ .Values.infra.aws.kvReplicaRegions }}"
            - name: CHRONON_METRICS_READER
              value: "http"
            - name: EXPORTER_OTLP_ENDPOINT
              value: "http://adot-prometheus-collector.opentelemetry-operator-system.svc.cluster.local:4318"
            - name: USE_ZGC
              value: "true"
          ports:
            - containerPort: {{ .Values.platform.orchestration.fetcher.port }}
          resources:
          {{- toYaml .Values.platform.orchestration.fetcher.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.platform.orchestration.fetcher.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.platform.orchestration.fetcher.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fetcher-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
spec:
  selector:
    app: fetcher
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.platform.orchestration.fetcher.port }}
      protocol: TCP
  type: ClusterIP
{{ end }}
