{{- if and .Values.compute.enabled .Values.compute.rbac.create }}
{{- $jobNamespace := include "zipline-orchestration.computeJobNamespace" . }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.compute.serviceAccount.sparkName }}
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
    app.kubernetes.io/component: spark-driver
  {{- with .Values.compute.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-driver
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-driver
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-driver
subjects:
  - kind: ServiceAccount
    name: {{ .Values.compute.serviceAccount.sparkName }}
    namespace: {{ $jobNamespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.compute.serviceAccount.flinkName }}
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
    app.kubernetes.io/component: flink-job
  {{- with .Values.compute.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-jobmanager
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-jobmanager
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-jobmanager
subjects:
  - kind: ServiceAccount
    name: {{ .Values.compute.serviceAccount.flinkName }}
    namespace: {{ $jobNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zipline-orchestration.fullname" . }}-compute
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
rules:
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["flink.apache.org"]
    resources: ["flinkdeployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["flink.apache.org"]
    resources: ["flinkdeployments/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zipline-orchestration.fullname" . }}-compute
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zipline-orchestration.fullname" . }}-compute
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
