{{- if and .Values.compute.enabled .Values.compute.rbac.create }}
{{- $root := . }}
{{- $namespaces := .Values.compute.namespaces | default list }}
{{- if eq (len $namespaces) 0 }}
{{- $namespaces = list (dict "name" (include "zipline-orchestration.computeDefaultNamespace" .) "team" "default") }}
{{- end }}
{{- range $namespace := $namespaces }}
{{- $jobNamespace := $namespace.name | default (include "zipline-orchestration.computeDefaultNamespace" $root) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $root.Values.compute.serviceAccount.sparkName }}
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" $root | nindent 4 }}
    app.kubernetes.io/component: spark-driver
  {{- with $root.Values.compute.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-driver
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" $root | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-driver
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" $root | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-driver
subjects:
  - kind: ServiceAccount
    name: {{ $root.Values.compute.serviceAccount.sparkName }}
    namespace: {{ $jobNamespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $root.Values.compute.serviceAccount.flinkName }}
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" $root | nindent 4 }}
    app.kubernetes.io/component: flink-job
  {{- with $root.Values.compute.flinkDefaults.serviceAccountAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-jobmanager
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" $root | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-jobmanager
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" $root | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-jobmanager
subjects:
  - kind: ServiceAccount
    name: {{ $root.Values.compute.serviceAccount.flinkName }}
    namespace: {{ $jobNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zipline-compute-submitter
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" $root | nindent 4 }}
rules:
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["flink.apache.org"]
    resources: ["flinkdeployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["flink.apache.org"]
    resources: ["flinkdeployments/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["ray.io"]
    resources: ["rayjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["ray.io"]
    resources: ["rayjobs/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zipline-compute-submitter
  namespace: {{ $jobNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" $root | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zipline-compute-submitter
subjects:
  - kind: ServiceAccount
    name: {{ include "zipline-orchestration.serviceAccountName" $root }}
    namespace: {{ $root.Release.Namespace }}
{{- end }}
{{- if .Values.compute.sparkDefaults.nvmeEnabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zipline-orchestration.fullname" . }}-compute-node-labeler
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zipline-orchestration.fullname" . }}-compute-node-labeler
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zipline-orchestration.fullname" . }}-compute-node-labeler
subjects:
  - kind: ServiceAccount
    name: {{ include "zipline-orchestration.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
