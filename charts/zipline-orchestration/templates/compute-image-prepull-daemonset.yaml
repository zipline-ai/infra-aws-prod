{{- if and .Values.compute.enabled .Values.compute.imagePrepull.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "zipline-orchestration.fullname" . }}-image-prepull
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-prepull
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zipline-orchestration.name" . }}-image-prepull
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "zipline-orchestration.name" . }}-image-prepull
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.platform.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.compute.imagePrepull.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.compute.imagePrepull.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- range $i, $image := .Values.compute.imagePrepull.images }}
        - name: pull-{{ $i }}
          image: {{ $image }}
          command: ["sh", "-c", "exit 0"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "10m"
              memory: "16Mi"
        {{- end }}
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "10m"
              memory: "16Mi"
{{- end }}
