{{- if and .Values.compute.enabled .Values.compute.warmPool.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zipline-orchestration.fullname" . }}-warm-pool
  namespace: {{ .Values.compute.warmPool.namespace | default .Release.Namespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
    app.kubernetes.io/component: warm-pool
spec:
  replicas: {{ .Values.compute.warmPool.replicas | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "zipline-orchestration.name" . }}-warm-pool
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "zipline-orchestration.name" . }}-warm-pool
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      priorityClassName: {{ .Values.compute.warmPool.priorityClassName | default "zipline-spark-pause" }}
      {{- if or .Values.compute.warmPool.taintKey .Values.compute.warmPool.nodeSelector }}
      nodeSelector:
        {{- if .Values.compute.warmPool.taintKey }}
        {{ .Values.compute.warmPool.taintKey }}: {{ .Values.compute.warmPool.taintValue | default "driver" }}
        {{- end }}
        {{- with .Values.compute.warmPool.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if or .Values.compute.warmPool.taintKey .Values.compute.warmPool.tolerations }}
      tolerations:
        {{- if .Values.compute.warmPool.taintKey }}
        - key: {{ .Values.compute.warmPool.taintKey | quote }}
          operator: "Equal"
          value: {{ .Values.compute.warmPool.taintValue | default "driver" | quote }}
          effect: "NoSchedule"
        {{- end }}
        {{- with .Values.compute.warmPool.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      terminationGracePeriodSeconds: 0
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: {{ .Values.compute.warmPool.resources.cpu | default "2" | quote }}
              memory: {{ .Values.compute.warmPool.resources.memory | default "4Gi" | quote }}
            limits:
              cpu: {{ .Values.compute.warmPool.resources.cpu | default "2" | quote }}
              memory: {{ .Values.compute.warmPool.resources.memory | default "4Gi" | quote }}
{{- end }}
