{{- if and .Values.compute.enabled .Values.compute.loki.enabled }}
{{- $cloud := .Values.compute.cloudProvider | default "" }}
{{- $bucket := .Values.infra.storage.warehouseBucket | default "" }}
{{- $systemNamespace := include "zipline-orchestration.computeSystemNamespace" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zipline-orchestration.fullname" . }}-loki
  namespace: {{ $systemNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      {{- if not (and $bucket (eq $cloud "aws")) }}
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      {{- end }}

    {{- if and $bucket (eq $cloud "aws") }}
    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/tsdb-index
        cache_location: /loki/tsdb-cache
      aws:
        bucketnames: {{ include "zipline-orchestration.computeBucketName" . }}
        region: {{ .Values.infra.aws.region | default "us-east-1" }}
        s3forcepathstyle: false
    {{- end }}

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          {{- if and $bucket (eq $cloud "aws") }}
          object_store: s3
          {{- else }}
          object_store: filesystem
          {{- end }}
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      retention_period: {{ .Values.compute.loki.retention | default "168h" }}
      ingestion_rate_mb: 32
      ingestion_burst_size_mb: 64
      per_stream_rate_limit: 16MB
      per_stream_rate_limit_burst: 32MB

    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      {{- if and $bucket (eq $cloud "aws") }}
      delete_request_store: s3
      {{- else }}
      delete_request_store: filesystem
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zipline-orchestration.fullname" . }}-loki
  namespace: {{ $systemNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: loki
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zipline-orchestration.fullname" . }}-loki
  namespace: {{ $systemNamespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: loki
    spec:
      serviceAccountName: {{ .Values.platform.serviceAccount.name }}
      tolerations:
        - key: "kubernetes.io/arch"
          operator: "Equal"
          value: "arm64"
          effect: "NoSchedule"
      containers:
        - name: loki
          image: {{ .Values.compute.loki.image | default "grafana/loki:3.4.2" }}
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.compute.loki.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: storage
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: {{ include "zipline-orchestration.fullname" . }}-loki
        - name: storage
          emptyDir:
            sizeLimit: {{ .Values.compute.loki.storage.size | default "10Gi" }}
{{- end }}
