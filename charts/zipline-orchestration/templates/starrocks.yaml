# StarRocks deployment for querying Iceberg tables via JDBC catalog
  # Combines FE (frontend) and BE (backend) in a single pod
  # Requires StarRocks >= 3.5.12 for JDBC Iceberg catalog support
{{- $dbHostParts := splitList ":" .Values.database.host }}
{{- $dbHost := index $dbHostParts 0 }}
{{- $dbPort := "5432" }}
{{- if gt (len $dbHostParts) 1 }}
{{- $dbPort = index $dbHostParts 1 }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: starrocks-config
  namespace: {{ .Release.Namespace }}
data:
  fe.conf: |
    # StarRocks FE configuration
    LOG_DIR = ${STARROCKS_HOME}/log
    DATE = "$(date +%Y%m%d-%H%M%S)"
    JAVA_OPTS="-Dlog4j2.formatMsgNoLookups=true -Xmx4096m -XX:+UseG1GC -Xlog:gc*:${LOG_DIR}/fe.gc.log.$DATE:time"
    http_port = 8030
    rpc_port = 9020
    query_port = 9030
    edit_log_port = 9010
    mysql_service_nio_enabled = true
    sys_log_level = INFO
    tablet_create_timeout_second = 60
    # Enable external catalog
    enable_experimental_mv = true
  be.conf: |
    # StarRocks BE configuration
    LOG_DIR = ${STARROCKS_HOME}/log
    sys_log_level = INFO
    be_port = 9060
    webserver_port = 8040
    heartbeat_service_port = 9050
    brpc_port = 8060
    # Storage configuration
    storage_root_path = ${STARROCKS_HOME}/storage
    mem_limit = 70%
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: starrocks-data
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: starrocks-jdbc-drivers
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: starrocks
  namespace: {{ .Release.Namespace }}
  labels:
    app: starrocks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: starrocks
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: starrocks
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Download PostgreSQL JDBC driver (cached in PVC across restarts)
        - name: download-jdbc-driver
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ -f /jdbc-drivers/postgresql-42.7.4.jar ]; then
                echo "JDBC driver already cached, skipping download"
              else
                echo "Downloading PostgreSQL JDBC driver..."
                wget -T 30 -O /jdbc-drivers/postgresql-42.7.4.jar \
                  "https://jdbc.postgresql.org/download/postgresql-42.7.4.jar"
                echo "JDBC driver downloaded successfully"
              fi
              ls -la /jdbc-drivers/
          volumeMounts:
            - name: jdbc-drivers
              mountPath: /jdbc-drivers
      containers:
        # Combined FE + BE container using StarRocks allin1 image
        - name: starrocks
          image: starrocks/allin1-ubuntu:3.5.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9030
              name: mysql
            - containerPort: 8030
              name: fe-http
            - containerPort: 8040
              name: be-http
          env:
            - name: STARROCKS_HOME
              value: /opt/starrocks
            - name: AWS_REGION
              value: "{{ .Values.aws.region }}"
            - name: AWS_DEFAULT_REGION
              value: "{{ .Values.aws.region }}"
          volumeMounts:
            - name: data
              mountPath: /opt/starrocks/fe/meta
              subPath: fe-meta
            - name: data
              mountPath: /opt/starrocks/be/storage
              subPath: be-storage
            - name: jdbc-drivers
              mountPath: /opt/starrocks/fe/lib/postgresql-42.7.4.jar
              subPath: postgresql-42.7.4.jar
            - name: jdbc-drivers
              mountPath: /opt/starrocks/be/lib/jni-packages/postgresql-42.7.4.jar
              subPath: postgresql-42.7.4.jar
            - name: config
              mountPath: /opt/starrocks/fe/conf/fe.conf
              subPath: fe.conf
            - name: config
              mountPath: /opt/starrocks/be/conf/be.conf
              subPath: be.conf
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          startupProbe:
            tcpSocket:
              port: 9030
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 9030
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9030
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: starrocks-data
        - name: jdbc-drivers
          persistentVolumeClaim:
            claimName: starrocks-jdbc-drivers
        - name: config
          configMap:
            name: starrocks-config
---
apiVersion: v1
kind: Service
metadata:
  name: starrocks
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: starrocks
  ports:
    - name: mysql
      port: 9030
      targetPort: 9030
    - name: fe-http
      port: 8030
      targetPort: 8030
    - name: be-http
      port: 8040
      targetPort: 8040
---
# NodePort service for local access
apiVersion: v1
kind: Service
metadata:
  name: starrocks-nodeport
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  selector:
    app: starrocks
  ports:
    - name: mysql
      port: 9030
      targetPort: 9030
      nodePort: 30930
    - name: fe-http
      port: 8030
      targetPort: 8030
      nodePort: 30830
---
# Job to initialize the Iceberg catalog after StarRocks is ready
apiVersion: batch/v1
kind: Job
metadata:
  name: starrocks-init-catalog
  namespace: {{ .Release.Namespace }}
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      restartPolicy: OnFailure
      initContainers:
        # Wait for StarRocks to actually accept queries (not just TCP)
        - name: wait-for-starrocks
          image: mysql:8.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for StarRocks to accept queries..."
              for i in $(seq 1 60); do
                if mysql -h starrocks -P 9030 -u root -e "SELECT 1" >/dev/null 2>&1; then
                  echo "StarRocks is ready and accepting queries"
                  exit 0
                fi
                echo "Attempt $i/60: StarRocks not ready, waiting..."
                sleep 3
              done
              echo "Timeout waiting for StarRocks"
              exit 1
        # Wait for PostgreSQL (Iceberg catalog backend)
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              for i in $(seq 1 30); do
                if nc -z {{ $dbHost | quote }} {{ $dbPort | quote }} 2>/dev/null; then
                  echo "PostgreSQL is ready"
                  exit 0
                fi
                sleep 2
              done
              exit 1
      containers:
        - name: init-catalog
          image: mysql:8.0
          command:
            - sh
            - -c
            - |
              echo "Creating Iceberg external catalog in StarRocks..."
              DB_USERNAME="$(cat /mnt/secrets-store/username)"
              DB_PASSWORD="$(cat /mnt/secrets-store/password)"

              sql_escape() {
                printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
              }

              DB_USERNAME_ESCAPED="$(sql_escape "$DB_USERNAME")"
              DB_PASSWORD_ESCAPED="$(sql_escape "$DB_PASSWORD")"

              cat > /tmp/init-catalog.sql <<EOF
              -- Create Iceberg external catalog pointing to the Terraform-managed RDS PostgreSQL instance.
              CREATE EXTERNAL CATALOG IF NOT EXISTS iceberg
              PROPERTIES (
                  "type" = "iceberg",
                  "iceberg.catalog.type" = "jdbc",
                  "iceberg.catalog.uri" = "jdbc:postgresql://{{ .Values.database.host }}/{{ .Values.database.name }}",
                  "iceberg.catalog.warehouse" = "s3://{{ .Values.aws.warehouseBucket }}/",
                  "iceberg.catalog.jdbc.user" = "${DB_USERNAME_ESCAPED}",
                  "iceberg.catalog.jdbc.password" = "${DB_PASSWORD_ESCAPED}",
                  "iceberg.catalog.jdbc.init-catalog-tables" = "true",
                  "aws.s3.use_instance_profile" = "true",
                  "aws.s3.region" = "{{ .Values.aws.region }}",
                  "client.region" = "{{ .Values.aws.region }}"
              );
              EOF

              mysql -h starrocks -P 9030 -u root < /tmp/init-catalog.sql

              # Verify catalog was created
              echo ""
              echo "Verifying catalog creation..."
              mysql -h starrocks -P 9030 -u root -e "SHOW CATALOGS;"

              echo ""
              echo "Iceberg catalog initialized successfully!"
              echo "You can now query Iceberg tables using: SET CATALOG iceberg;"
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "db-secret-provider"
