apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orchestration-ui-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.ui.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ui.className }}
  rules:
    {{- if .Values.ingress.ui.host }}
    - host: {{ .Values.ingress.ui.host }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          {{- if .Values.compute.enabled }}
          # Route /spark-history → spark-history-server Service. SHS already
          # serves its UI under this base via -Dspark.ui.proxyBase so the
          # ingress just forwards. Placed before / so nginx-ingress's longest-
          # prefix-wins ordering routes correctly.
          - path: {{ include "zipline-orchestration.historyServerProxyBase" . }}
            pathType: Prefix
            backend:
              service:
                name: spark-history-server
                port:
                  number: 18080
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orchestration-ui-service
                port:
                  number: 80
