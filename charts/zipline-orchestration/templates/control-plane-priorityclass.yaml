{{- if .Values.controlPlanePlacement.priorityClassName }}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ .Values.controlPlanePlacement.priorityClassName | quote }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
value: {{ .Values.controlPlanePlacement.priorityClassValue | default 1000 }}
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Zipline control-plane pods. Keeps Hub, UI, eval, and ingress above Spark engine pods."
{{- end }}
