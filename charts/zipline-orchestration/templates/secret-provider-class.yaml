apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: db-secret-provider
  namespace: {{ .Release.Namespace }}
spec:
  provider: aws
  secretObjects:
    - secretName: db-credentials
      type: Opaque
      data:
        - objectName: password
          key: password
        - objectName: username
          key: username
    {{- if .Values.aws.databricksSpSecretArn }}
    - secretName: databricks-sp-credentials
      type: Opaque
      data:
        - objectName: databricks-client-id
          key: databricks-client-id
        - objectName: databricks-client-secret
          key: databricks-client-secret
    {{- end }}
    {{- if .Values.aws.snowflakePolarisSpSecretArn }}
    - secretName: snowflake-polaris-credentials
      type: Opaque
      data:
        - objectName: snowflake-polaris-client-id
          key: snowflake-polaris-client-id
        - objectName: snowflake-polaris-client-secret
          key: snowflake-polaris-client-secret
    {{- end }}
    {{- if .Values.auth.enabled }}
    - secretName: auth-secret
      type: Opaque
      data:
        - objectName: auth-secret
          key: auth-secret
        - objectName: google-oauth-client-secret
          key: google-oauth-client-secret
        - objectName: github-oauth-client-secret
          key: github-oauth-client-secret
        - objectName: microsoft-entra-oauth-client-secret
          key: microsoft-entra-oauth-client-secret
        - objectName: sso-client-secret
          key: sso-client-secret
    {{- end }}

  parameters:
    objects: |
      - objectName: {{ .Values.aws.secretsArn }}
        objectType: secretsmanager
        jmesPath:
          - path: password
            objectAlias: password
          - path: username
            objectAlias: username
      {{- if .Values.aws.databricksSpSecretArn }}
      - objectName: {{ .Values.aws.databricksSpSecretArn }}
        objectType: secretsmanager
        jmesPath:
          - path: client_id
            objectAlias: databricks-client-id
          - path: client_secret
            objectAlias: databricks-client-secret
      {{- end }}
      {{- if .Values.aws.snowflakePolarisSpSecretArn }}
      - objectName: {{ .Values.aws.snowflakePolarisSpSecretArn }}
        objectType: secretsmanager
        jmesPath:
          - path: client_id
            objectAlias: snowflake-polaris-client-id
          - path: client_secret
            objectAlias: snowflake-polaris-client-secret
      {{- end }}
      {{- if .Values.auth.enabled }}
      - objectName: {{ .Values.auth.secrets_arn }}
        objectType: secretsmanager
        jmesPath:
          - path: '"auth-secret"'
            objectAlias: "auth-secret"
          - path: '"google-oauth-client-secret"'
            objectAlias: "google-oauth-client-secret"
          - path: '"github-oauth-client-secret"'
            objectAlias: "github-oauth-client-secret"
          - path: '"microsoft-entra-oauth-client-secret"'
            objectAlias: "microsoft-entra-oauth-client-secret"
          - path: '"sso-client-secret"'
            objectAlias: "sso-client-secret"
      {{- end }}
