apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eval-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.eval.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.eval.className }}
  rules:
    {{- if .Values.ingress.eval.host }}
    - host: {{ .Values.ingress.eval.host }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          {{- $path := .Values.ingress.eval.path | default "/" }}
          - path: {{ if eq $path "/" }}/{{ else }}{{ printf "%s(/|$)(.*)" $path }}{{ end }}
            pathType: {{ if eq $path "/" }}Prefix{{ else }}ImplementationSpecific{{ end }}
            backend:
              service:
                name: eval-service
                port:
                  number: 80
