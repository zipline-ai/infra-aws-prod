apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipline-orchestration-hub
  namespace: {{ .Release.Namespace }}
  labels:
    app: orchestration-hub
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.platform.orchestration.hub.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: orchestration-hub
  template:
    metadata:
      labels:
        app: orchestration-hub
    spec:
      serviceAccountName: {{ .Values.platform.serviceAccount.name }}
      {{- with .Values.platform.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: orchestration-hub
          image: "{{ .Values.platform.orchestration.hub.image }}:{{ .Values.platform.version }}"
          imagePullPolicy: Always
          env:
            - name: VERTICLE_CLASS
              value: "ai.chronon.hub.AWSOrchestrationVerticle,ai.chronon.hub.AWSWorkflowExecutionVerticle"
            - name: DB_URL
              value: "jdbc:postgresql://{{ .Values.infra.database.host }}/{{ .Values.infra.database.name }}"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: CUSTOMER_ID
              value: {{ .Values.infra.global.customerName | quote }}
            - name: ARTIFACT_PREFIX
              value: {{ .Values.infra.global.artifactPrefix | quote }}
            - name: ORCHESTRATION_PORT
              value: "{{ .Values.platform.orchestration.hub.port }}"
            - name: HUB_FRONTEND_URL
              value: "http://orchestration-ui-service/"
            {{- if .Values.platform.ingress.hub.externalUrl }}
            - name: HUB_BASE_URL
              value: {{ .Values.platform.ingress.hub.externalUrl | quote }}
            {{- else if .Values.infra.domains.hub }}
            - name: HUB_BASE_URL
              value: "https://{{ .Values.infra.domains.hub }}"
            {{- end }}
            - name: AWS_REGION
              value: "{{ .Values.infra.aws.region }}"
            - name: AWS_DEFAULT_REGION
              value: "{{ .Values.infra.aws.region }}"
            - name: CHRONON_METRICS_READER
              value: "http"
            - name: KV_TABLE_PREFIX
              value: "{{ .Values.infra.aws.kvTablePrefix }}"
            - name: KV_ENABLE_TTL
              value: "{{ .Values.infra.aws.kvEnableTtl }}"
            - name: KV_REPLICA_REGIONS
              value: "{{ .Values.infra.aws.kvReplicaRegions }}"
            - name: FLINK_EKS_SERVICE_ACCOUNT
              value: "{{ .Values.infra.aws.flinkEksServiceAccount }}"
            - name: FLINK_EKS_NAMESPACE
              value: "{{ .Values.infra.aws.flinkEksNamespace }}"
            - name: EKS_CLUSTER_NAME
              value: "{{ .Values.infra.aws.eksClusterName }}"
            - name: EMR_EXECUTION_ROLE_ARN
              value: "{{ .Values.infra.aws.emrExecutionRoleArn }}"
            - name: EMR_LOG_URI
              value: "{{ .Values.infra.aws.emrLogUri }}"
            - name: EMR_CLOUDWATCH_LOG_GROUP
              value: "{{ .Values.infra.aws.emrCloudWatchLogGroup }}"
            {{- if .Values.compute.enabled }}
            # In-cluster compute env contract — consumed by platform's
            # AWSWorkflowExecutionVerticle (gate) and K8sSubmitter (config),
            # via the K8sUtils constants in k8s/.../K8sUtils.scala.
            - name: IN_CLUSTER_COMPUTE_ENABLED
              value: "true"
            - name: K8S_NAMESPACE
              value: {{ include "zipline-orchestration.computeJobNamespace" . | quote }}
            - name: SPARK_IMAGE
              value: "{{ .Values.compute.sparkDefaults.image }}"
            - name: SPARK_SERVICE_ACCOUNT
              value: "{{ .Values.compute.serviceAccount.sparkName }}"
            - name: SPARK_HISTORY_SERVER_URL
              value: "http://spark-history-server.{{ .Release.Namespace }}.svc.cluster.local:18080"
            - name: SPARK_EVENT_LOG_DIR
              value: {{ include "zipline-orchestration.sparkEventLogDir" . | quote }}
            {{- end }}
            - name: EXPORTER_OTLP_ENDPOINT
              value: "http://adot-prometheus-collector.opentelemetry-operator-system.svc.cluster.local:4318"
            {{- if .Values.infra.aws.databricksSpSecretArn }}
            - name: DATABRICKS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: databricks-sp-credentials
                  key: client_id
            - name: DATABRICKS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: databricks-sp-credentials
                  key: client_secret
            {{- end }}
            - name: AUTH_ENABLED
              value: "{{ .Values.platform.auth.enabled }}"
            - name: AUTH_JWKS_URL
              value: "{{ .Values.platform.auth.jwksUrl }}"
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          ports:
            - containerPort: {{ .Values.platform.orchestration.hub.port }}
          resources:
          {{- toYaml .Values.platform.orchestration.hub.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.platform.orchestration.hub.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.platform.orchestration.hub.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "db-secret-provider"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestration-hub-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zipline-orchestration.labels" . | nindent 4 }}
spec:
  selector:
    app: orchestration-hub
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.platform.orchestration.hub.port }}
      protocol: TCP
  type: ClusterIP
