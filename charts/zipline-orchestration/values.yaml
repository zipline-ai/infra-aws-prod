# ============================================================================
# Default values for zipline-orchestration on AWS
#
# Ownership model (see infra-aws-prod README or charts/zipline-orchestration
# CHART_OWNERSHIP.md for details):
#
#   infra:    Set by Terraform output; slow-changing AWS/EKS/RDS bindings.
#             Customers do not hand-edit; these flow from terraform.tfvars
#             into orchestration-aws/helm-values.yaml.tpl.
#
#   platform: Owned by Helm / the zipline admin CLI. Changes every chart
#             upgrade: image tags, replicas, resources, ingress, auth.
#
#   compute:  Owned by Helm now, by a Hub-managed CRD later. Gated on
#             spark_compute_enabled (the Terraform migration flag). When
#             false, every compute-* template renders nothing.
#
#   Top-level keys for Helm subcharts (spark-operator, promtail, ingress-
#   nginx-*) cannot move under these prefixes — Helm requires them at root.
# ============================================================================

# ---------------------------------------------------------------------------
# Terraform-owned: infrastructure bindings.
# Filled by orchestration-aws/helm-values.yaml.tpl from TF outputs and tfvars.
# ---------------------------------------------------------------------------
infra:
  global:
    customerName: ""
    artifactPrefix: ""

  aws:
    region: ""
    secretsArn: ""
    databricksSpSecretArn: ""
    eksClusterName: ""
    kvEnableTtl: "true"
    kvTablePrefix: ""
    kvReplicaRegions: ""
    flinkEksServiceAccount: ""
    flinkEksNamespace: ""
    emrExecutionRoleArn: ""
    emrLogUri: ""
    emrCloudWatchLogGroup: ""

  storage:
    # S3 warehouse bucket name (no scheme prefix).
    warehouseBucket: ""

  database:
    host: ""
    name: "execution_info"

  iam:
    # Hub pod IRSA role ARN.
    orchestrationIrsaArn: ""
    # IAM role used by SparkApplication driver/executor SAs (per team
    # namespace). Empty when spark_compute_enabled=false.
    sparkComputeRoleArn: ""

  domains:
    ui: ""        # If empty, accessible via load balancer DNS.
    hub: ""       # If empty, accessible via load balancer DNS.
    fetcher: ""   # If empty, accessible via load balancer DNS.
    eval: ""      # If empty, accessible via load balancer DNS.

  prometheus:
    queryEndpoint: ""
    namespace: "zipline-system"

# ---------------------------------------------------------------------------
# Helm-owned: platform behavior. Tunable per release; safe to upgrade often.
# ---------------------------------------------------------------------------
platform:
  version: ""
  deployFetcher: false

  imagePullSecrets:
    - name: docker-hub-creds

  serviceAccount:
    create: true
    name: orchestration-sa

  orchestration:
    hub:
      image: "ziplineai/hub-aws"
      replicas: 1
      port: 3903
      resources:
        limits:
          cpu: "6"
          memory: "28Gi"
        requests:
          cpu: "2"
          memory: "8Gi"

    ui:
      image: "ziplineai/web-ui"
      replicas: 1
      port: 3000
      resources:
        limits:
          cpu: "1000m"
          memory: "1Gi"
        requests:
          cpu: "250m"
          memory: "256Mi"

    fetcher:
      image: "ziplineai/chronon-fetcher"
      replicas: 3
      port: 9000
      resources:
        limits:
          cpu: "8"
          memory: "32Gi"
        requests:
          cpu: "8"
          memory: "32Gi"

    eval:
      image: "ziplineai/eval-aws"
      replicas: 1
      port: 3904
      resources:
        requests:
          cpu: "500m"
          memory: "4Gi"
        limits:
          cpu: "2"
          memory: "8Gi"

  ingress:
    ui:
      className: nginx-ui
      annotations: {}
    hub:
      className: nginx-hub
      # Override HUB_BASE_URL directly (e.g. http://my-hub-foo). Use when a
      # custom ALB/proxy sits in front of the nginx ELB.
      externalUrl: ""
      annotations:
        nginx.ingress.kubernetes.io/health-check-path: "/ping"
        nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    fetcher:
      className: nginx-fetcher
      annotations:
        nginx.ingress.kubernetes.io/health-check-path: "/ping"
    eval:
      className: nginx-eval
      annotations: {}

  auth:
    enabled: false
    url: ""
    secretsArn: ""
    jwksUrl: ""
    googleOauthClientId: ""
    googleOauthClientSecret: ""
    githubOauthClientId: ""
    githubOauthClientSecret: ""
    microsoftEntraTenantId: ""
    microsoftEntraOauthClientId: ""
    microsoftEntraOauthClientSecret: ""
    ssoProviderId: ""
    ssoDomain: ""
    ssoIssuer: ""
    ssoClientId: ""
    ssoClientSecret: ""
    idpRoleMapping: ""
    idpGroupClaim: ""

# ---------------------------------------------------------------------------
# Helm-owned, gated on compute.enabled (TF sets this from spark_compute_enabled).
# Renders nothing when disabled. Per-team config in compute.teams[] is the
# bootstrap path; future Hub CRDs will manage team namespaces dynamically.
# ---------------------------------------------------------------------------
compute:
  enabled: false
  cloudProvider: aws

  # Forward-looking contract for per-(team, mode) node-level segmentation.
  # NOT stamped on pod specs today — workloads share the existing default
  # EKS node group. When Karpenter NodePools or per-mode managed node groups
  # land, the Hub (or compute-nodepools template) will stamp these keys as
  # nodeSelector on SparkApplication / FlinkDeployment specs. Customers
  # should not override.
  nodeLabels:
    teamKey: zipline.ai/team
    modeKey: zipline.ai/mode
    modes:   [batch, streaming, model]

  serviceAccount:
    sparkName: spark-operator-spark
    flinkName: flink

  rbac:
    create: true

  sparkDefaults:
    image: "ziplineai/spark:3.5-crucible-latest"
    eventLogDir: ""           # Defaults to s3a://<infra.storage.warehouseBucket>/spark-events
    nvmeEnabled: true
    nvmeSetupImage: "amazon/aws-cli:2.27.33"
    executorCores: 14
    executorMemory: "48Gi"
    driverCores: 2
    driverMemory: "4Gi"
    executorNodeSelector: {}
    executorTolerations: []
    spotNodeSelector: {}
    driverNodeSelector: {}
    driverTolerations: []

  flinkDefaults:
    image: "ziplineai/flink:1.20.3"
    parallelism: 1

  # Defaults the Hub uses when constructing SparkApplication / FlinkDeployment
  # CRDs. Not customer-tunable per release — bake new defaults into the chart
  # version.
  hubSubmitterDefaults:
    jarName: "cloud_aws_lib_deploy.jar"
    jarUriOverride: ""
    spotExecutors: false

  driverPriorityClass:
    enabled: true
    name: "zipline-spark-driver"
    value: 100

  flinkDriverPriorityClass:
    enabled: true
    name: "zipline-flink-driver"
    value: 100

  systemPriorityClass:
    enabled: true
    name: "zipline-compute-system"
    value: 1000

  warmPool:
    enabled: false
    replicas: 2
    priorityClassName: "zipline-spark-pause"
    namespace: ""             # Defaults to release namespace.
    resources:
      cpu: "2"
      memory: "4Gi"
    taintKey: ""
    taintValue: "driver"
    nodeSelector: {}
    tolerations: []

  imagePrepull:
    enabled: false
    images: []
    nodeSelector: {}
    tolerations: []

  historyServer:
    enabled: true
    # Match sparkDefaults.image — keep driver/executor and history server on
    # the same Spark major version so event-log format and UI render align.
    # Crucible 3.5 image lineage is what the in-cluster path uses; bump to a
    # UC-bearing 3.5 tag once the crucible-side image PR lands (mirrors
    # zipline-ai/chronon#1898 UC bake-in for the EMR Serverless image).
    image: "ziplineai/spark:3.5-crucible-latest"
    proxyBase: "spark-history"
    daemonMemory: "5g"
    hybridStoreMemory: "4g"
    maxDiskUsage: "50g"
    cleanerMaxAge: "3d"
    retainedApplications: 50
    resources:
      requests:
        cpu: "2"
        memory: "6Gi"
      limits:
        memory: "8Gi"
    persistence:
      enabled: true
      storageClass: ""
      size: 10Gi

  loki:
    enabled: true
    image: "grafana/loki:3.4.2"
    retention: "168h"
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        memory: 1Gi
    storage:
      size: 10Gi

  # Bootstrap team namespaces. Each entry produces a Namespace + spark/flink
  # ServiceAccounts (IRSA-annotated with infra.iam.sparkComputeRoleArn) +
  # Role/RoleBinding + LimitRange + scoped ResourceQuotas. The compute_team_
  # namespace_prefix TF variable scopes the IRSA trust to all entries here.
  # Hub-managed CRDs will replace this list eventually.
  teams:
    - name: default
      namespace: zipline-default
      limitRange:
        default:
          cpu: "2"
          memory: "4Gi"
        defaultRequest:
          cpu: "500m"
          memory: "1Gi"
      # Multiple scoped quotas per namespace so batch and streaming budgets
      # are tracked separately within one team namespace.
      resourceQuotas:
        - name: batch
          scopeSelector:
            matchExpressions:
              - scopeName: PriorityClassName
                operator: In
                values:
                  - zipline-spark-driver
          hard:
            requests.cpu: "200"
            requests.memory: "800Gi"
        - name: streaming
          scopeSelector:
            matchExpressions:
              - scopeName: PriorityClassName
                operator: In
                values:
                  - zipline-flink-driver
          hard:
            requests.cpu: "100"
            requests.memory: "400Gi"

# ---------------------------------------------------------------------------
# Helm subcharts (must stay at root per Helm dependency convention).
# ---------------------------------------------------------------------------

ingress-nginx-ui:
  enabled: true
  controller:
    ingressClassResource:
      name: nginx-ui
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-ui"
    ingressClass: nginx-ui
    service:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    electionID: ingress-controller-leader-ui
    namespaceOverride: ingress-nginx-ui

ingress-nginx-fetcher:
  enabled: true
  fullnameOverride: nginx-fetcher
  controller:
    ingressClassResource:
      name: nginx-fetcher
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-fetcher"
    ingressClass: nginx-fetcher
    service:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/ping"
    electionID: ingress-controller-leader-fetcher
    namespaceOverride: ingress-nginx-fetcher

ingress-nginx-eval:
  enabled: true
  controller:
    ingressClassResource:
      name: nginx-eval
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-eval"
    ingressClass: nginx-eval
    service:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/ping"
    electionID: ingress-controller-leader-eval
    namespaceOverride: ingress-nginx-eval

ingress-nginx-hub:
  enabled: true
  controller:
    ingressClassResource:
      name: nginx-hub
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-hub"
    ingressClass: nginx-hub
    service:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/ping"
    electionID: ingress-controller-leader-hub
    namespaceOverride: ingress-nginx-hub

spark-operator:
  enabled: true
  controller:
    replicas: 2
    workers: 20
    kubeAPIQPS: 100
    kubeAPIBurst: 200
  spark:
    jobNamespaces:
      - ""

promtail:
  enabled: true
  config:
    clients:
      - url: http://zipline-orchestration-loki:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - cri: {}
      extraRelabelConfigs:
        - source_labels: [__meta_kubernetes_namespace]
          action: drop
          regex: kube-system|kube-public|kube-node-lease|cert-manager|gke-managed-.*|gmp-.*|default
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
