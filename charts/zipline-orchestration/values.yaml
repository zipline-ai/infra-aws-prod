# Default values for zipline-orchestration on AWS

global:
  customer_name: ""
  artifact_prefix: ""
  version: ""

# AWS-specific configuration
aws:
  region: ""
  secretsArn: ""
  databricksSpSecretArn: ""
  eksClusterName: ""
  flinkEksServiceAccount: ""
  flinkEksNamespace: ""

# Database configuration
database:
  host: ""
  name: "execution_info"

# Service account configuration with IRSA
serviceAccount:
  create: true
  name: orchestration-sa
  annotations:
    eks.amazonaws.com/role-arn: ""

# Domain configuration
domains:
  ziplineUI: ""  # If empty, accessible via load balancer DNS
  hub: ""        # If empty, accessible via load balancer DNS

# Orchestration services configuration
orchestration:
  hub:
    image: "ziplineai/hub-aws"
    replicas: 1
    port: 3903
    resources:
      limits:
        cpu: "6"
        memory: "28Gi"
      requests:
        cpu: "2"
        memory: "8Gi"

  ui:
    image: "ziplineai/web-ui"
    replicas: 1
    port: 3000
    resources:
      limits:
        cpu: "1000m"
        memory: "1Gi"
      requests:
        cpu: "250m"
        memory: "256Mi"

  fetcher:
    image: "ziplineai/chronon-fetcher"
    tag: "dev"
    replicas: 1
    port: 9000
    resources:
      limits:
        cpu: "4"
        memory: "8Gi"
      requests:
        cpu: "1"
        memory: "2Gi"

  eval:
    image: "ziplineai/eval-aws"
    replicas: 1
    port: 3904
    resources:
      requests:
        cpu: "500m"
        memory: "4Gi"
      limits:
        cpu: "2"
        memory: "8Gi"

# Ingress NGINX for UI
ingress-nginx-ui:
  enabled: true
  controller:
    ingressClassResource:
      name: nginx-ui
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-ui"
    ingressClass: nginx-ui
    service:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    electionID: ingress-controller-leader-ui
    namespaceOverride: ingress-nginx-ui

# Ingress NGINX for Fetcher
ingress-nginx-fetcher:
  enabled: true
  fullnameOverride: nginx-fetcher
  controller:
    ingressClassResource:
      name: nginx-fetcher
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-fetcher"
    ingressClass: nginx-fetcher
    service:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/ping"
    electionID: ingress-controller-leader-fetcher
    namespaceOverride: ingress-nginx-fetcher

# Ingress NGINX for Eval
ingress-nginx-eval:
  enabled: true
  controller:
    ingressClassResource:
      name: nginx-eval
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-eval"
    ingressClass: nginx-eval
    service:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/ping"
    electionID: ingress-controller-leader-eval
    namespaceOverride: ingress-nginx-eval

# Ingress NGINX for Hub
ingress-nginx-hub:
  enabled: true
  controller:
    ingressClassResource:
      name: nginx-hub
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-hub"
    ingressClass: nginx-hub
    service:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/ping"
    electionID: ingress-controller-leader-hub
    namespaceOverride: ingress-nginx-hub

# Ingress configuration
ingress:
  ui:
    className: nginx-ui
    host: ""
    annotations: {}
  hub:
    className: nginx-hub
    host: ""
    annotations:
      nginx.ingress.kubernetes.io/health-check-path: "/ping"
      nginx.ingress.kubernetes.io/proxy-body-size: "20m"
  fetcher:
    className: nginx-fetcher
    host: ""
    annotations:
      nginx.ingress.kubernetes.io/health-check-path: "/ping"
  eval:
    className: nginx-eval
    host: ""
    annotations: {}

# Image pull secrets for Docker Hub
imagePullSecrets:
  - name: docker-hub-creds

# Prometheus configuration
prometheus:
  queryEndpoint: ""
  namespace: "zipline-system"
