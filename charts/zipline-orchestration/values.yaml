# Default values for zipline-orchestration on AWS

global:
  customer_name: ""
  artifact_prefix: ""
  version: ""
  deploy_fetcher: false

# AWS-specific configuration
aws:
  region: ""
  secretsArn: ""
  kvEnableTtl: "true"
  databricksSpSecretArn: ""
  eksClusterName: ""
  flinkEksServiceAccount: ""
  flinkEksNamespace: ""
  emrExecutionRoleArn: ""
  emrLogUri: ""
  emrCloudWatchLogGroup: ""

compute:
  enabled: false
  cloudProvider: aws
  defaultNamespace: zipline-default
  namespaceDefaults:
    labels: {}
    annotations: {}
    resourceQuota:
      enabled: true
      hard:
        requests.cpu: "200"
        requests.memory: "800Gi"
        limits.cpu: "400"
        limits.memory: "1600Gi"
        pods: "500"
    limitRange:
      enabled: true
      default:
        cpu: "2"
        memory: "8Gi"
      defaultRequest:
        cpu: "500m"
        memory: "1Gi"
  namespaces:
    - name: zipline-default
      team: default
      labels: {}
      annotations: {}
  nodePools:
    default:
      team: default
      mode: default
      nodeSelector: {}
      tolerations: []
    batch:
      team: default
      mode: batch
      nodeSelector: {}
      tolerations: []
    streaming:
      team: default
      mode: streaming
      nodeSelector: {}
      tolerations: []
    model:
      team: default
      mode: model
      nodeSelector: {}
      tolerations: []
  objectStore:
    bucket: ""      # e.g. s3://warehouse-bucket
    region: ""
  serviceAccount:
    sparkName: spark-operator-spark
    flinkName: flink
    annotations: {}
  rbac:
    create: true
  sparkDefaults:
    eventLogDir: "" # Defaults to s3a://<objectStore.bucket>/spark-events
    image: "ziplineai/spark:nightly"
    imagePullPolicy: "Always"
    chrononJarPath: "/opt/chronon/chronon-spark.jar"
    nvmeEnabled: true
    nvmeSetupImage: "amazon/aws-cli:2.27.33"
    executorCores: 14
    executorMemory: "48Gi"
    driverCores: 2
    driverMemory: "4Gi"
    executorNodeSelector: {}
    executorTolerations: []
    spotNodeSelector: {}
    driverNodeSelector:
      karpenter.sh/capacity-type: on-demand
    driverTolerations: []
  driverPriorityClass:
    enabled: true
    name: "zipline-spark-driver"
    value: 100
  systemPriorityClass:
    enabled: true
    name: "zipline-compute-system"
    value: 1000
  warmPool:
    enabled: false
    replicas: 2
    priorityClassName: "zipline-spark-pause"
    namespace: ""  # Defaults to release namespace.
    resources:
      cpu: "2"
      memory: "4Gi"
    taintKey: ""
    taintValue: "driver"
    nodeSelector: {}
    tolerations: []
  imagePrepull:
    enabled: false
    images: []
    nodeSelector: {}
    tolerations: []
  historyServer:
    image: "ziplineai/spark:nightly"
    proxyBase: "spark-history"
    daemonMemory: "5g"
    hybridStoreMemory: "4g"
    maxDiskUsage: "50g"
    cleanerMaxAge: "3d"
    retainedApplications: 50
    resources:
      requests:
        cpu: "2"
        memory: "6Gi"
      limits:
        memory: "8Gi"
    persistence:
      enabled: true
      storageClass: ""
      size: 10Gi
  loki:
    enabled: true
    image: "grafana/loki:3.4.2"
    retention: "168h"
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        memory: 1Gi
    storage:
      size: 10Gi

# Database configuration
database:
  host: ""
  name: "execution_info"

# Service account configuration with IRSA
serviceAccount:
  create: true
  name: orchestration-sa
  annotations:
    eks.amazonaws.com/role-arn: ""

# Domain configuration
domains:
  ziplineUI: ""  # If empty, accessible via load balancer DNS
  hub: ""        # If empty, accessible via load balancer DNS

# Orchestration services configuration
orchestration:
  hub:
    image: "ziplineai/hub-aws"
    replicas: 1
    port: 3903
    resources:
      limits:
        cpu: "6"
        memory: "28Gi"
      requests:
        cpu: "2"
        memory: "8Gi"

  ui:
    image: "ziplineai/web-ui"
    replicas: 1
    port: 3000
    resources:
      limits:
        cpu: "1000m"
        memory: "1Gi"
      requests:
        cpu: "250m"
        memory: "256Mi"

  fetcher:
    image: "ziplineai/chronon-fetcher"
    replicas: 3
    port: 9000
    resources:
      limits:
        cpu: "8"
        memory: "32Gi"
      requests:
        cpu: "8"
        memory: "32Gi"

  eval:
    image: "ziplineai/eval-aws"
    replicas: 1
    port: 3904
    resources:
      requests:
        cpu: "500m"
        memory: "4Gi"
      limits:
        cpu: "2"
        memory: "8Gi"

# Ingress NGINX for UI
ingress-nginx-ui:
  enabled: true
  controller:
    ingressClassResource:
      name: nginx-ui
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-ui"
    ingressClass: nginx-ui
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    service:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    electionID: ingress-controller-leader-ui
    namespaceOverride: ingress-nginx-ui

# Ingress NGINX for Fetcher
ingress-nginx-fetcher:
  enabled: true
  fullnameOverride: nginx-fetcher
  controller:
    ingressClassResource:
      name: nginx-fetcher
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-fetcher"
    ingressClass: nginx-fetcher
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    service:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/ping"
    electionID: ingress-controller-leader-fetcher
    namespaceOverride: ingress-nginx-fetcher

# Ingress NGINX for Eval
ingress-nginx-eval:
  enabled: true
  controller:
    ingressClassResource:
      name: nginx-eval
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-eval"
    ingressClass: nginx-eval
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    service:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/ping"
    electionID: ingress-controller-leader-eval
    namespaceOverride: ingress-nginx-eval

# Ingress NGINX for Hub
ingress-nginx-hub:
  enabled: true
  controller:
    ingressClassResource:
      name: nginx-hub
      enabled: true
      default: false
      controllerValue: "k8s.io/ingress-nginx-hub"
    ingressClass: nginx-hub
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    service:
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/ping"
    electionID: ingress-controller-leader-hub
    namespaceOverride: ingress-nginx-hub

# Ingress configuration
ingress:
  ui:
    className: nginx-ui
    host: ""
    annotations: {}
  hub:
    className: nginx-hub
    host: ""
    externalUrl: ""  # Override HUB_BASE_URL directly (e.g. http://my-hub-foo). Use when a custom ALB/proxy sits in front of the nginx ELB.
    annotations:
      nginx.ingress.kubernetes.io/health-check-path: "/ping"
      nginx.ingress.kubernetes.io/proxy-body-size: "20m"
  fetcher:
    className: nginx-fetcher
    host: ""
    annotations:
      nginx.ingress.kubernetes.io/health-check-path: "/ping"
  eval:
    className: nginx-eval
    host: ""
    annotations: {}

# Image pull secrets for Docker Hub
imagePullSecrets:
  - name: docker-hub-creds

# Prometheus configuration
prometheus:
  queryEndpoint: ""
  namespace: "zipline-system"

spark-operator:
  enabled: true
  controller:
    replicas: 2
    workers: 20
    kubeAPIQPS: 100
    kubeAPIBurst: 200
  spark:
    jobNamespaces: []
    jobNamespaceSelector: zipline.ai/namespace-type=compute
    serviceAccount:
      create: false
      name: spark-operator-spark
    rbac:
      create: false

promtail:
  enabled: true
  config:
    clients:
      - url: http://zipline-orchestration-loki:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - cri: {}
      extraRelabelConfigs:
        - source_labels: [__meta_kubernetes_namespace]
          action: drop
          regex: kube-system|kube-public|kube-node-lease|cert-manager|gke-managed-.*|gmp-.*|default
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

auth:
  enabled: false
  url: ""
  secrets_arn: ""
  jwksUrl: ""
  google_oauth_client_id: ""
  google_oauth_client_secret: ""
  github_oauth_client_id: ""
  github_oauth_client_secret: ""
  microsoft_entra_tenant_id: ""
  microsoft_entra_oauth_client_id: ""
  microsoft_entra_oauth_client_secret: ""
  sso_provider_id: ""
  sso_domain: ""
  sso_issuer: ""
  sso_client_id: ""
  sso_client_secret: ""
  sso_use_saml: false
  sso_saml_entry_point: ""
  sso_saml_issuer: ""
  sso_saml_callback_url: ""
  idp_role_mapping: ""
  idp_group_claim: ""
