# Helm values for the crucible-eks cluster in the zipline-ai canary AWS account
# (account 345594603419, region us-west-2). Mirrors values-eks-dev.yaml but
# points at the company-owned canary infrastructure provisioned by
# infra-aws-prod/crucible-aws/ rather than the personal dev account.

replicaCount: 1

cloudProvider: aws

image:
  # ECR `latest` is mirrored manually from main — there's no CI publish into
  # this account today. Once PR #11 (Spark History Server /jobs/ redirect)
  # lands and is re-mirrored, the canary picks it up on the next pull.
  repository: 345594603419.dkr.ecr.us-west-2.amazonaws.com/crucible-gateway
  tag: "spark-resolve-20260514-173949"
  pullPolicy: Always

objectStore:
  bucket: s3://zipline-crucible-canary
  region: us-west-2

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::345594603419:role/crucible-gateway"

sparkDefaults:
  eventLogDir: "s3a://zipline-crucible-canary/spark-events"
  executorCores: 1
  executorMemory: "2Gi"
  driverCores: 1
  driverMemory: "1Gi"
  # The canary EKS nodegroup is plain Graviton (no instance-attached NVMe), so
  # leaving the default nvmeEnabled=true would pin executors to crucible.ai/nvme=true
  # nodes that never exist and leave them Pending forever.
  nvmeEnabled: false
  serviceAccountAnnotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::345594603419:role/crucible-spark"
  adminConf:
    # Some chronon configs emit `s3://...` URIs (vs the more common `s3a://`);
    # without this mapping the driver fails JAR resolution with
    # "No FileSystem for scheme s3".
    "spark.hadoop.fs.s3.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.AbstractFileSystem.s3.impl": "org.apache.hadoop.fs.s3a.S3A"
    # Without this provider list the S3A driver falls back to the default chain
    # (TemporaryAWS, SimpleAWS, EnvVar, IAMInstance) — none of which understand
    # the IRSA AWS_WEB_IDENTITY_TOKEN_FILE that EKS injects into the driver pod.
    # Hadoop 3.4 / S3A v2 needs the AWS SDK v2 class; the older
    # com.amazonaws.auth.WebIdentityTokenCredentialsProvider is silently
    # ignored ("v1 SDK entry") and the chain falls back to the v2 default
    # list, producing NoAuthWithAWSException on the first S3 call.
    "spark.hadoop.fs.s3a.aws.credentials.provider": "software.amazon.awssdk.auth.credentials.WebIdentityTokenFileCredentialsProvider"

flinkDefaults:
  checkpointDir: "s3a://zipline-crucible-canary/flink/checkpoints"
  savepointDir: "s3a://zipline-crucible-canary/flink/savepoints"
  parallelism: 1
  taskSlots: 1
  jmMemory: "1024m"
  jmCPU: 0.5
  tmMemory: "1024m"
  tmCPU: 1

# Gateway ingress at /api/v1 (no rewrite — the gateway mounts /api/v1
# routes natively). Spark History Server gets its own Ingress; see
# historyServer.ingress below.
ingress:
  enabled: true
  className: nginx
  host: "crucible-aws.zipline.ai"
  path: /api/v1
  pathType: Prefix

gateway:
  defaultJobNamespace: test-ns-a
  maxJobsPerNamespace: 50

warmPool:
  enabled: false

imagePrepull:
  enabled: false

historyServer:
  image: "345594603419.dkr.ecr.us-west-2.amazonaws.com/spark:4.1-crucible-latest"
  # SHS lives at /spark-history; the chart derives the proxy path from this URL.
  publicUrl: "https://crucible-aws.zipline.ai/spark-history"
  ingress:
    enabled: true
  daemonMemory: "1g"
  hybridStoreMemory: "512m"
  maxDiskUsage: "5g"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      memory: "2Gi"
  persistence:
    enabled: false
