{{- if and .Values.rayHistoryServer.enabled .Values.rayHistoryServer.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ray-history-dashboard
  namespace: {{ .Values.gateway.namespace | default "crucible-system" }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
    app.kubernetes.io/component: ray-history-dashboard
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- with .Values.rayHistoryServer.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with (.Values.rayHistoryServer.ingress.className | default .Values.ingress.className) }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  rules:
    - {{- with (.Values.rayHistoryServer.ingress.host | default .Values.ingress.host) }}
      host: {{ . | quote }}
      {{- end }}
      http:
        paths:
          - path: {{ printf "%s(/|$)(.*)" (trimSuffix "/" .Values.rayHistoryServer.proxyBase) }}
            pathType: ImplementationSpecific
            backend:
              service:
                name: ray-history-dashboard
                port:
                  number: 8265
{{- end }}
