{{- if .Values.warmPool.enabled }}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ .Values.warmPool.priorityClassName | default "crucible-pause" }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
value: -1
globalDefault: false
description: "Low-priority class for Crucible warm pool pause pods. These get preempted when real jobs arrive."
{{- end }}
