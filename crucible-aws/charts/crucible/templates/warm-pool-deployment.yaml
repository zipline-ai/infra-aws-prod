{{- if .Values.warmPool.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crucible.fullname" . }}-warm-pool
  namespace: {{ .Values.warmPool.namespace | default .Values.gateway.namespace }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
    app.kubernetes.io/component: warm-pool
spec:
  replicas: {{ .Values.warmPool.replicas | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "crucible.name" . }}-warm-pool
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "crucible.name" . }}-warm-pool
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        # Prevent Karpenter from consolidating (bin-packing) these placeholder pods onto
        # existing nodes. Without this annotation, WhenEmptyOrUnderutilized consolidation
        # silently removes the pre-warmed nodes, defeating the warm pool.
        # See: https://karpenter.sh/docs/concepts/disruption/
        karpenter.sh/do-not-disrupt: "true"
    spec:
      priorityClassName: {{ .Values.warmPool.priorityClassName | default "crucible-pause" }}
      nodeSelector:
        {{- if .Values.warmPool.taintKey }}
        {{ .Values.warmPool.taintKey }}: {{ .Values.warmPool.taintValue | default "driver" }}
        {{- end }}
        {{- with .Values.warmPool.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      tolerations:
        {{- if .Values.warmPool.taintKey }}
        - key: {{ .Values.warmPool.taintKey | quote }}
          operator: "Equal"
          value: {{ .Values.warmPool.taintValue | default "driver" | quote }}
          effect: "NoSchedule"
        {{- end }}
        {{- with .Values.warmPool.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      terminationGracePeriodSeconds: 0
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: {{ .Values.warmPool.resources.cpu | default "2" }}
              memory: {{ .Values.warmPool.resources.memory | default "4Gi" }}
            limits:
              cpu: {{ .Values.warmPool.resources.cpu | default "2" }}
              memory: {{ .Values.warmPool.resources.memory | default "4Gi" }}
{{- end }}
