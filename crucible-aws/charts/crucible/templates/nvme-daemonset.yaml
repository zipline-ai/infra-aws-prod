{{- if .Values.sparkDefaults.nvmeEnabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "crucible.fullname" . }}-nvme-setup
  namespace: {{ .Values.gateway.namespace | default "crucible-system" }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
    app.kubernetes.io/component: nvme-setup
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "crucible.name" . }}-nvme-setup
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "crucible.name" . }}-nvme-setup
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # Run on ALL nodes — the init container detects NVMe and exits cleanly on non-NVMe nodes.
      tolerations:
        - operator: Exists
      hostPID: false
      serviceAccountName: {{ include "crucible.serviceAccountName" . }}
      initContainers:
        - name: nvme-setup
          image: {{ .Values.sparkDefaults.nvmeSetupImage | default "amazon/aws-cli:2.27.33" }}
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command:
            - /bin/sh
            - -c
            - |
              # Detect NVMe instance store and set up the node if found.
              # Non-NVMe nodes: exit 0 cleanly.
              FOUND_NVME=false

              mount_nvme() {
                dev="$1"
                REAL_DEV=$(echo "$dev" | sed 's|/host-dev/|/dev/|')
                if grep -q " /mnt/nvme " /host-proc/mounts 2>/dev/null; then
                  echo "$REAL_DEV already mounted at /mnt/nvme"
                  return 0
                fi

                mkfs.ext4 -F "$dev" 2>/dev/null || true
                mkdir -p /host-mnt/nvme

                if command -v nsenter >/dev/null 2>&1; then
                  nsenter --mount=/host-proc/1/ns/mnt -- /usr/bin/mkdir -p /mnt/nvme
                  nsenter --mount=/host-proc/1/ns/mnt -- /usr/bin/mount "$REAL_DEV" /mnt/nvme
                  nsenter --mount=/host-proc/1/ns/mnt -- /usr/bin/chmod 1777 /mnt/nvme
                else
                  mount "$dev" /host-mnt/nvme
                  chmod 1777 /host-mnt/nvme
                fi

                echo "Formatted and mounted $REAL_DEV at /mnt/nvme"
              }

              # --- Detection method 1: nvme id-ctrl model string (EKS) ---
              if command -v nvme >/dev/null 2>&1; then
                for dev in /host-dev/nvme*n1; do
                  [ -b "$dev" ] || continue
                  MODEL=$(nvme id-ctrl "$dev" -o json 2>/dev/null | grep -o '"mn" *: *"[^"]*"' | head -1 | sed 's/.*: *"//;s/".*//' | xargs 2>/dev/null || true)
                  if echo "$MODEL" | grep -qi "Instance Storage"; then
                    # EKS: format + mount the instance store at /mnt/nvme
                    mount_nvme "$dev"
                    FOUND_NVME=true
                    break
                  fi
                done
              fi

              # --- Detection method 2: GKE auto-mounted local SSD ---
              if [ "$FOUND_NVME" = "false" ] && grep -q "kube-ephemeral-ssd" /host-proc/mounts 2>/dev/null; then
                # GKE local SSD is already mounted by the node. The gateway
                # auto-detects the path via cloudProvider=gcp. No mount needed.
                echo "GKE local SSD detected (auto-mounted)"
                FOUND_NVME=true
              fi

              # --- Detection method 3: sysfs model string (AKS/other) ---
              if [ "$FOUND_NVME" = "false" ]; then
                for dev in /host-dev/nvme*n1; do
                  [ -b "$dev" ] || continue
                  devname=$(basename "$dev")
                  model=$(cat "/host-sys/block/$devname/device/model" 2>/dev/null | xargs 2>/dev/null || true)
                  if echo "$model" | grep -qi "Instance\|NVMe SSD\|NVMe Direct Disk\|Local"; then
                    mount_nvme "$dev"
                    FOUND_NVME=true
                    break
                  fi
                done
              fi

              # --- No NVMe: exit cleanly ---
              if [ "$FOUND_NVME" = "false" ]; then
                echo "No NVMe instance store on this node, skipping"
                exit 0
              fi

              # --- Label + taint the node ---
              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              KUBE_CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              KUBE_API="https://kubernetes.default.svc"

              CURRENT=$(curl -s --cacert "$KUBE_CA" -H "Authorization: Bearer $KUBE_TOKEN" \
                "$KUBE_API/api/v1/nodes/$NODE_NAME" | grep -o '"crucible.ai/nvme":"true"' || true)

              if [ -z "$CURRENT" ]; then
                PATCH='{"metadata":{"labels":{"crucible.ai/nvme":"true"}},"spec":{"taints":[{"key":"crucible.ai/nvme","value":"true","effect":"NoSchedule"}]}}'
                curl -s --cacert "$KUBE_CA" -H "Authorization: Bearer $KUBE_TOKEN" \
                  -H "Content-Type: application/strategic-merge-patch+json" \
                  -X PATCH "$KUBE_API/api/v1/nodes/$NODE_NAME" \
                  -d "$PATCH" >/dev/null
                echo "Labeled and tainted node $NODE_NAME"
              else
                echo "Node $NODE_NAME already labeled"
              fi
          volumeMounts:
            - name: host-dev
              mountPath: /host-dev
            - name: host-mnt
              mountPath: /host-mnt
              mountPropagation: Bidirectional
            - name: host-proc
              mountPath: /host-proc
              readOnly: true
            - name: host-sys
              mountPath: /host-sys
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "10m"
              memory: "16Mi"
      volumes:
        - name: host-dev
          hostPath:
            path: /dev
        - name: host-mnt
          hostPath:
            path: /mnt
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
{{- end }}
