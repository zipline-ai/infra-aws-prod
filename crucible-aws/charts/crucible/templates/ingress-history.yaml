{{- if and .Values.historyServer.enabled .Values.historyServer.ingress.enabled }}
# Spark History Server direct passthrough. nginx strips the path prefix before
# forwarding; SHS only sees raw paths (its spark.ui.proxyBase only affects
# what it emits, not what it accepts).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spark-history-server
  namespace: {{ .Values.gateway.namespace | default "crucible-system" }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
    app.kubernetes.io/component: spark-history-server
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- with .Values.historyServer.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with (.Values.historyServer.ingress.className | default .Values.ingress.className) }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  rules:
    - {{- with (.Values.historyServer.ingress.host | default .Values.ingress.host) }}
      host: {{ . | quote }}
      {{- end }}
      http:
        paths:
          - path: {{ printf "%s(/|$)(.*)" (trimSuffix "/" .Values.historyServer.proxyBase) }}
            pathType: ImplementationSpecific
            backend:
              service:
                name: spark-history-server
                port:
                  number: 18080
{{- end }}
