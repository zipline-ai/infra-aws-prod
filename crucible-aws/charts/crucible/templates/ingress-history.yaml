{{- if .Values.historyServer.ingress.enabled }}
{{- $base := include "crucible.historyServerProxyBase" . -}}
{{- $host := .Values.historyServer.ingress.host | default .Values.ingress.host -}}
# Spark observability has one browser-facing owner: the Crucible gateway.
# nginx only selects the gateway for the public subtree; it does not strip
# prefixes, split routes, or rewrite Spark History Server Location headers.
#
# Gateway URL policy:
#   {proxyBase}/spark/<ns>/<id>[/...]      -> live Spark UI or SHS redirect
#   {proxyBase}/flink/<ns>/<id>/ui[/...]   -> live Flink UI proxy
#   {proxyBase}/jobs/<ns>/<id>/ui[/...]    -> live Spark UI proxy back-compat
#   {proxyBase}/pods/<ns>/<pod>/logs       -> executor pod logs
#   {proxyBase}/api/v1/namespaces/...      -> Crucible API mirror
#   {proxyBase}/<everything-else>          -> Spark History Server proxy
#   /history/...                           -> gateway canonical redirect
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spark-history-gateway
  namespace: {{ .Values.gateway.namespace | default "crucible-system" }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
    app.kubernetes.io/component: spark-history-gateway
  {{- with .Values.historyServer.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with (.Values.historyServer.ingress.className | default .Values.ingress.className) }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  rules:
    - {{- with $host }}
      host: {{ . | quote }}
      {{- end }}
      http:
        paths:
          - path: {{ $base | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "crucible.fullname" . }}
                port:
                  number: {{ .Values.gateway.port }}
          - path: "/history"
            pathType: Prefix
            backend:
              service:
                name: {{ include "crucible.fullname" . }}
                port:
                  number: {{ .Values.gateway.port }}
{{- end }}
