{{- if and .Values.crd.install (not (index .Values "spark-operator" "enabled")) }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sparkapplications.sparkoperator.k8s.io
  annotations:
    api-approved.kubernetes.io: "https://github.com/GoogleCloudPlatform/spark-on-k8s-operator"
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
spec:
  group: sparkoperator.k8s.io
  names:
    kind: SparkApplication
    listKind: SparkApplicationList
    plural: sparkapplications
    singular: sparkapplication
    shortNames:
      - sparkapp
  scope: Namespaced
  versions:
    - name: v1beta2
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
{{- end }}
