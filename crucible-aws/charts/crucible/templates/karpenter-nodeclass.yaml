{{- if and .Values.karpenter.enabled (eq (.Values.cloudProvider | default "") "aws") }}
{{- $nodeClass := .Values.karpenter.ec2NodeClass | default dict }}
{{- $clusterName := include "crucible.karpenterClusterName" . | trim }}
{{- if not $clusterName }}
{{- fail "karpenter.clusterName or karpenter-controller.settings.clusterName is required when karpenter.enabled=true" }}
{{- end }}
{{- if and $nodeClass.role $nodeClass.instanceProfile }}
{{- fail "karpenter.ec2NodeClass supports exactly one of role or instanceProfile, not both" }}
{{- end }}
{{- if and (not $nodeClass.role) (not $nodeClass.instanceProfile) }}
{{- fail "karpenter.ec2NodeClass.role or karpenter.ec2NodeClass.instanceProfile is required when karpenter.enabled=true" }}
{{- end }}
{{- $discoveryTags := dict "karpenter.sh/discovery" $clusterName }}
{{- $tags := mergeOverwrite (deepCopy ($nodeClass.tags | default dict)) $discoveryTags }}
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: {{ required "karpenter.ec2NodeClass.name is required when karpenter.enabled=true" $nodeClass.name }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
    app.kubernetes.io/component: karpenter-nodeclass
spec:
  {{- with $nodeClass.amiFamily }}
  amiFamily: {{ . | quote }}
  {{- end }}
  {{- if $nodeClass.role }}
  role: {{ $nodeClass.role | quote }}
  {{- else }}
  instanceProfile: {{ $nodeClass.instanceProfile | quote }}
  {{- end }}
  amiSelectorTerms:
    - alias: {{ required "karpenter.ec2NodeClass.amiAlias is required when karpenter.enabled=true" $nodeClass.amiAlias | quote }}
  subnetSelectorTerms:
    {{- if $nodeClass.subnetSelectorTerms }}
    {{- toYaml $nodeClass.subnetSelectorTerms | nindent 4 }}
    {{- else }}
    - tags:
        karpenter.sh/discovery: {{ $clusterName | quote }}
    {{- end }}
  securityGroupSelectorTerms:
    {{- if $nodeClass.securityGroupSelectorTerms }}
    {{- toYaml $nodeClass.securityGroupSelectorTerms | nindent 4 }}
    {{- else }}
    - tags:
        karpenter.sh/discovery: {{ $clusterName | quote }}
    {{- end }}
  tags:
    {{- toYaml $tags | nindent 4 }}
  {{- with $nodeClass.metadataOptions }}
  metadataOptions:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $nodeClass.blockDeviceMappings }}
  blockDeviceMappings:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $nodeClass.userData }}
  userData: |
    {{- . | nindent 4 }}
  {{- end }}
{{- end }}
