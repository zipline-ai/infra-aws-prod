{{- if and .Values.monitoring .Values.monitoring.prometheusRule .Values.monitoring.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "crucible.fullname" . }}-ray
  namespace: {{ .Values.gateway.namespace }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
    {{- with .Values.monitoring.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: crucible-ray
      rules:
        - alert: CrucibleRayPodsPending
          expr: sum by (namespace) (kube_pod_status_phase{phase="Pending", pod=~"training-.*"}) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Ray training pods are pending
            description: One or more Crucible Ray training pods have been pending for more than 5 minutes.
        - alert: CrucibleRayHeadRestarts
          expr: increase(kube_pod_container_status_restarts_total{container="ray-head"}[15m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Ray head container restarted
            description: A Ray head container restarted. Check Ray head and submitter logs in Loki.
        - alert: CrucibleRayAutoscalerRestarts
          expr: increase(kube_pod_container_status_restarts_total{container="autoscaler"}[15m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Ray autoscaler restarted
            description: A Ray autoscaler sidecar restarted. Check ray-autoscaler logs in Loki.
        - alert: CrucibleRayHistoryServerDown
          expr: absent(up{service="ray-history-dashboard"} == 1)
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Ray history dashboard is not scrapeable
            description: The Ray history dashboard service is not reporting as up.
{{- end }}
