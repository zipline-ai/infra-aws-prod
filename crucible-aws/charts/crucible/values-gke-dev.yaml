replicaCount: 1

cloudProvider: gcp

image:
  repository: us-docker.pkg.dev/crucible-io/crucible/gateway
  tag: "latest"
  pullPolicy: Always

objectStore:
  bucket: gs://crucible-dev-bucket

serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: crucible-gateway@crucible-io.iam.gserviceaccount.com

sparkDefaults:
  eventLogDir: "gs://crucible-dev-bucket/spark-events"
  nvmeEnabled: false      # GKE nightly favors stable ARM coverage over scale-from-zero NVMe shuffle nodes.
  executorCores: 1         # dev cluster has small nodes
  executorMemory: "1Gi"
  driverCores: 1
  driverMemory: "1Gi"
  serviceAccountAnnotations:
    iam.gke.io/gcp-service-account: crucible-spark@crucible-io.iam.gserviceaccount.com

flinkDefaults:
  checkpointDir: "gs://crucible-dev-bucket/flink/checkpoints"
  savepointDir: "gs://crucible-dev-bucket/flink/savepoints"
  parallelism: 1
  taskSlots: 1
  jmMemory: "2048m"
  jmCPU: 0.5
  tmMemory: "2048m"
  tmCPU: 1

gateway:
  defaultJobNamespace: test-ns-a
  maxJobsPerNamespace: 50

kuberay-operator:
  tolerations:
    - key: "kubernetes.io/arch"
      operator: "Equal"
      value: "arm64"
      effect: "NoSchedule"

spark-operator:
  controller:
    tolerations:
      - key: "kubernetes.io/arch"
        operator: "Equal"
        value: "arm64"
        effect: "NoSchedule"
  webhook:
    tolerations:
      - key: "kubernetes.io/arch"
        operator: "Equal"
        value: "arm64"
        effect: "NoSchedule"

flink-kubernetes-operator:
  operatorPod:
    tolerations:
      - key: "kubernetes.io/arch"
        operator: "Equal"
        value: "arm64"
        effect: "NoSchedule"

historyServer:
  image: "us-docker.pkg.dev/crucible-io/crucible/spark:4.1-crucible-latest"
  daemonMemory: "1g"
  hybridStoreMemory: "512m"
  maxDiskUsage: "5g"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      memory: "8Gi"
  persistence:
    enabled: true
    storageClass: dynamic-rwo    # uses Hyperdisk Balanced on c4a (Axion); pd does not work on c4a
    size: 5Gi

rayHistoryServer:
  enabled: true
  image: "us-docker.pkg.dev/crucible-io/crucible/ray-historyserver:kuberay-1.6.1-ray-2.55.1-latest"
  collectorImage: "us-docker.pkg.dev/crucible-io/crucible/ray-history-collector:kuberay-1.6.1-ray-2.55.1-latest"
  rayImage: "rayproject/ray:2.55.1"
  runtimeClass: "gcs"
  rootDir: "log"
  env:
    GCS_BUCKET: "crucible-dev-bucket"
