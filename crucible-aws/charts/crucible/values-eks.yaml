# EKS deployment — all auth via IRSA (IAM Roles for Service Accounts).
# No static AWS keys anywhere. Customer creates two IAM roles:
#   1. crucible-gateway — for the gateway/control-plane pod
#   2. crucible-spark   — for Spark driver/executor pods (data access, event logs)
#
# Prerequisites:
#   - EKS cluster with OIDC provider enabled
#   - cert-manager installed (required by Flink operator)
#   - S3 bucket created with spark-events/ prefix
#   - IAM roles with trust policy for the EKS OIDC provider
#
# Install:
#   helm install crucible . -f values-eks.yaml -n crucible-system --create-namespace

cloudProvider: aws

image:
  repository: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/crucible-gateway
  tag: "0.1.0"
  pullPolicy: IfNotPresent

objectStore:
  bucket: s3://BUCKET_NAME

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/crucible-gateway

sparkDefaults:
  eventLogDir: "s3a://BUCKET_NAME/spark-events"
  logArchiveDir: "s3://BUCKET_NAME/jobs"
  executorCores: 14
  executorMemory: "48Gi"
  driverCores: 2
  driverMemory: "4Gi"
  nvmeEnabled: true
  executorAZ: ""             # e.g., "us-east-1a" — pin executors to single AZ
  # IRSA annotation for Spark driver/executor pods.
  # This role needs: s3:GetObject, s3:PutObject, s3:ListBucket on the data bucket.
  # Vector sidecar inherits this SA, so the role also needs s3:PutObject on the log archive prefix.
  serviceAccountAnnotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/crucible-spark
  # Pin Spark drivers to on-demand nodes. Spot interruption kills the driver and
  # the entire job; executors are recoverable via decommissioning but drivers are not.
  # karpenter.sh/capacity-type is set by Karpenter on all nodes it provisions.
  driverNodeSelector:
    karpenter.sh/capacity-type: on-demand
  # No adminConf needed — the cloud overlay already sets:
  #   spark.hadoop.fs.s3a.aws.credentials.provider=com.amazonaws.auth.WebIdentityTokenCredentialsProvider
  # IRSA injects AWS_ROLE_ARN + AWS_WEB_IDENTITY_TOKEN_FILE into every pod with the annotated SA.
  adminConf: {}

gateway:
  defaultJobNamespace: crucible-jobs
  maxJobsPerNamespace: 0     # 0 = unlimited

vector:
  image: "timberio/vector:0.43.1-alpine"

warmPool:
  enabled: true
  replicas: 2
  resources:
    cpu: "2"
    memory: "4Gi"

imagePrepull:
  enabled: true
  images:
    - ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/spark:4.1-crucible-latest
