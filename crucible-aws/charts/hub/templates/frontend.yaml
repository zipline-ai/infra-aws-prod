{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hub.fullname" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ include "hub.fullname" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "hub.fullname" . }}-frontend
    spec:
      {{- if .Values.placement.priorityClassName }}
      priorityClassName: {{ .Values.placement.priorityClassName | quote }}
      {{- end }}
      {{- with .Values.placement.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        {{- toYaml .Values.placement.tolerations | nindent 8 }}
      {{- with .Values.placement.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web-ui
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
          env:
            - name: API_BASE_URL
              value: "http://{{ include "hub.fullname" . }}:{{ .Values.hub.port }}"
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ include "hub.pgname" . }}:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
            - name: AUTH_ENABLED
              value: {{ .Values.frontend.env.authEnabled | quote }}
            - name: AUTH_URL
              value: {{ .Values.frontend.env.authUrl | quote }}
            - name: CLOUD_PROVIDER
              value: {{ .Values.hub.cloudProvider | quote }}
            - name: LOG_PROVIDER
              value: {{ .Values.frontend.env.logProvider | quote }}
            - name: LOKI_URL
              value: {{ .Values.frontend.env.lokiUrl | quote }}
            - name: LOKI_NAMESPACE
              value: {{ .Values.frontend.env.lokiNamespace | quote }}
            - name: CRUCIBLE_PUBLIC_URL
              value: {{ .Values.frontend.env.cruciblePublicUrl | quote }}
            - name: LOG_SERVICE_WORKFLOW_PROFILE
              value: {{ .Values.frontend.env.logServiceWorkflowProfile | quote }}
            - name: LOG_SERVICE_NODE_STEP_RUN_PROFILE
              value: {{ .Values.frontend.env.logServiceNodeStepRunProfile | quote }}
            - name: LOG_SERVICE_ENGINE_PROFILE
              value: {{ .Values.frontend.env.logServiceEngineProfile | quote }}
            - name: READ_ONLY
              value: {{ .Values.frontend.env.readOnly | quote }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hub.fullname" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: {{ include "hub.fullname" . }}-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
{{- end }}
