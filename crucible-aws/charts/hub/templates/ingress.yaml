{{- if .Values.ingress.enabled }}
# Frontend at /  — no rewrite. SvelteKit assets like /_app/immutable/*
# must pass through unchanged.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hub.fullname" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hub.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "hub.fullname" . }}-frontend
                port:
                  number: 80
---
# Hub REST API under /hub, stripped before forwarding.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hub.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hub.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /hub(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "hub.fullname" . }}
                port:
                  number: {{ .Values.hub.port }}
{{- end }}
