{{- if .Values.hub.databricks.clientId }}
# Databricks service-principal OAuth creds for Unity Catalog access. Rendered
# only when hub.databricks.clientId is set. `credential` is the Iceberg-REST
# OAuth2 form (clientId:clientSecret), derived here so it is not a separate input.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hub.fullname" . }}-databricks
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hub.labels" . | nindent 4 }}
type: Opaque
stringData:
  client_id: {{ .Values.hub.databricks.clientId | quote }}
  client_secret: {{ .Values.hub.databricks.clientSecret | quote }}
  credential: {{ printf "%s:%s" .Values.hub.databricks.clientId .Values.hub.databricks.clientSecret | quote }}
{{- end }}
